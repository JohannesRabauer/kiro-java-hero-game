<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Hero Cards - Quiz</title>
    <link rel="stylesheet" href="css/notifications.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .quiz-card.fade-out {
            opacity: 0;
            transform: translateX(-20px);
        }

        .quiz-card.fade-in {
            opacity: 0;
            transform: translateX(20px);
        }

        .progress-indicator {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 0.75rem;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #42a5f5, #7c4dff);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2rem;
            line-height: 1.5;
            text-align: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .option-btn {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-family: inherit;
            color: #e0e0e0;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(66, 165, 245, 0.15);
            border-color: rgba(66, 165, 245, 0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(66, 165, 245, 0.2);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-btn.correct {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
            color: #a5d6a7;
            box-shadow: 0 0 16px rgba(76, 175, 80, 0.3);
        }

        .option-btn.incorrect {
            background: rgba(244, 67, 54, 0.2);
            border-color: #f44336;
            color: #ef9a9a;
            box-shadow: 0 0 16px rgba(244, 67, 54, 0.3);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .feedback {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 1.5rem;
            transition: opacity 0.3s ease;
        }

        .feedback.correct {
            color: #4CAF50;
        }

        .feedback.incorrect {
            color: #f44336;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: #aaa;
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 0.75rem;
        }

        .error-message button {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .error-message button:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .complete-indicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(66, 165, 245, 0.1);
            border: 1px solid rgba(66, 165, 245, 0.3);
            border-radius: 0.75rem;
            color: #bbdefb;
            font-size: 0.95rem;
        }

        .complete-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(66, 165, 245, 0.3);
            border-top-color: #42a5f5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .retry-complete-btn {
            margin-top: 0.5rem;
            background: rgba(66, 165, 245, 0.15) !important;
            border-color: rgba(66, 165, 245, 0.5) !important;
            color: #bbdefb !important;
            text-align: center !important;
        }

        .retry-complete-btn:hover {
            background: rgba(66, 165, 245, 0.25) !important;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .quiz-card {
                padding: 1.5rem 1.25rem;
            }

            .question-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="loading" class="loading">Loading quiz...</div>
        <div id="error" class="error-message" style="display: none;">
            <p id="error-text"></p>
            <button onclick="window.location.reload()">Retry</button>
        </div>
        <div id="quiz-card" class="quiz-card" style="display: none;">
            <div class="progress-indicator">
                <span id="progress-text">Question 1 of 3</span>
                <div class="progress-bar">
                    <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>
            <p id="question-text" class="question-text"></p>
            <div id="options-list" class="options-list"></div>
            <div id="feedback" class="feedback"></div>
            <div id="complete-indicator" class="complete-indicator" style="display: none;">
                <div class="complete-spinner"></div>
                <span>Saving progress...</span>
            </div>
        </div>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
